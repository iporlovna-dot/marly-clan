<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARLY — Новости</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="nav-logo">☠</div><span>MARLY</span></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="members.html" class="nav-link">Участники</a>
      <a href="rotation.html" class="nav-link">Ротация</a>
      <a href="tournaments.html" class="nav-link">Турниры</a>
      <a href="news.html" class="nav-link active">Новости</a>
    </div>
    <button class="nav-login">Войти</button>
  </nav>
  <main class="main">
    <div class="page-title">Новости</div>
    <div id="news-list"></div>
    <button class="add-btn" onclick="openModal()">+ Написать новость</button>
  </main>
  <footer class="footer">
    <div class="footer-bottom">
      <div class="footer-copy">© 2025 <span>MARLY Clan</span>. Все права защищены.</div>
    </div>
  </footer>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title" id="modal-title">Написать новость</div>
      <div class="form-group"><label>Дата</label><input id="f-date" type="text" placeholder="05.06.2025"></div>
      <div class="form-group"><label>Заголовок</label><input id="f-title" type="text" placeholder="Заголовок новости"></div>
      <div class="form-group"><label>Текст</label><textarea id="f-body" rows="4" placeholder="Текст новости..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-save" onclick="saveNews()">Опубликовать</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let editId = null;

    function render() {
      const newsList = document.getElementById('news-list');
      const news = getData('news');
      newsList.innerHTML = '';
      news.forEach(n => {
        const card = document.createElement('div');
        card.className = 'panel news-card';
        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="news-date">${n.date}</div>
            <div class="row-actions">
              <button class="btn-edit" onclick="editNews(${n.id})">✏</button>
              <button class="btn-del" onclick="deleteNews(${n.id})">✕</button>
            </div>
          </div>
          <div class="news-title">${n.title}</div>
          <div class="news-body">${n.body}</div>`;
        newsList.appendChild(card);
      });
    }

    function openModal(id) {
      editId = id || null;
      document.getElementById('modal-title').textContent = id ? 'Редактировать новость' : 'Написать новость';
      if (id) {
        const n = getData('news').find(x => x.id === id);
        document.getElementById('f-date').value  = n.date;
        document.getElementById('f-title').value = n.title;
        document.getElementById('f-body').value  = n.body;
      } else {
        const today = new Date();
        const d = String(today.getDate()).padStart(2,'0');
        const m = String(today.getMonth()+1).padStart(2,'0');
        const y = today.getFullYear();
        document.getElementById('f-date').value  = `${d}.${m}.${y}`;
        document.getElementById('f-title').value = '';
        document.getElementById('f-body').value  = '';
      }
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      editId = null;
    }

    function editNews(id) { openModal(id); }

    function saveNews() {
      const news  = getData('news');
      const date  = document.getElementById('f-date').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const body  = document.getElementById('f-body').value.trim();
      if (!title) return alert('Введи заголовок');
      if (editId) {
        const idx = news.findIndex(x => x.id === editId);
        news[idx] = { ...news[idx], date, title, body };
      } else {
        news.unshift({ id: Date.now(), date, title, body });
      }
      saveData('news', news);
      closeModal();
      render();
    }

    function deleteNews(id) {
      if (!confirm('Удалить новость?')) return;
      saveData('news', getData('news').filter(n => n.id !== id));
      render();
    }

    render();
  </script>
</body>
</html>
