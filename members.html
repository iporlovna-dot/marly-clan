<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARLY — Участники</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="nav-logo">☠</div><span>MARLY</span></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="members.html" class="nav-link active">Участники</a>
      <a href="rotation.html" class="nav-link">Ротация</a>
      <a href="tournaments.html" class="nav-link">Турниры</a>
      <a href="news.html" class="nav-link">Новости</a>
    </div>
    <button class="nav-login">Войти</button>
  </nav>
  <main class="main">
    <div class="page-title">Участники клана</div>
    <div class="panel" id="members-list"></div>
    <button class="add-btn" onclick="openModal()">+ Добавить участника</button>
  </main>
  <footer class="footer">
    <div class="footer-bottom">
      <div class="footer-copy">© 2025 <span>MARLY Clan</span>. Все права защищены.</div>
    </div>
  </footer>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title" id="modal-title">Добавить участника</div>
      <div class="form-group"><label>Никнейм</label><input id="f-name" type="text" placeholder="ShadowKing"></div>
      <div class="form-group"><label>Аватар (2 буквы)</label><input id="f-av" type="text" maxlength="2" placeholder="SK"></div>
      <div class="form-group"><label>Должность</label>
        <select id="f-role">
          <option>Лидер</option>
          <option>Офицер</option>
          <option selected>Участник</option>
        </select>
      </div>
      <div class="form-group"><label>Часы в игре</label><input id="f-hours" type="number" placeholder="500"></div>
      <div class="form-group"><label>K/D</label><input id="f-kd" type="number" step="0.1" placeholder="1.5"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-save" onclick="saveMember()">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const ROLE_COLORS = {
      'Лидер':   { bg:'#1f2e12', fg:'#C0DD97', badge:'bl' },
      'Офицер':  { bg:'#2a1010', fg:'#F09595', badge:'bo' },
      'Участник':{ bg:'#1a1a1a', fg:'#888780', badge:'bm' },
    };

    let editId = null;

    function render() {
      const members = getData('members');
      const list = document.getElementById('members-list');
      list.innerHTML = `<div class="sec-title">Состав — ${members.length} игроков</div>`;
      members.forEach(m => {
        const c = ROLE_COLORS[m.role] || ROLE_COLORS['Участник'];
        const row = document.createElement('div');
        row.className = 'mem-row';
        row.innerHTML = `
          <div class="${m.online ? 'dot-on' : 'dot-off'}"></div>
          <div class="av" style="background:${c.bg};color:${c.fg}">${m.av}</div>
          <div class="mem-info">
            <div class="pname">${m.name}</div>
            <div class="ptag">${m.game} · ${m.hours}ч · K/D: ${m.kd}</div>
          </div>
          <div class="badge ${c.badge}">${m.role}</div>
          <div class="row-actions">
            <button class="btn-edit" onclick="editMember(${m.id})">✏</button>
            <button class="btn-del" onclick="deleteMember(${m.id})">✕</button>
          </div>`;
        list.appendChild(row);
      });
    }

    function openModal(id) {
      editId = id || null;
      const members = getData('members');
      document.getElementById('modal-title').textContent = id ? 'Редактировать участника' : 'Добавить участника';
      if (id) {
        const m = members.find(x => x.id === id);
        document.getElementById('f-name').value = m.name;
        document.getElementById('f-av').value = m.av;
        document.getElementById('f-role').value = m.role;
        document.getElementById('f-hours').value = m.hours;
        document.getElementById('f-kd').value = m.kd;
      } else {
        document.getElementById('f-name').value = '';
        document.getElementById('f-av').value = '';
        document.getElementById('f-role').value = 'Участник';
        document.getElementById('f-hours').value = '';
        document.getElementById('f-kd').value = '';
      }
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      editId = null;
    }

    function editMember(id) { openModal(id); }

    function saveMember() {
      const members = getData('members');
      const name  = document.getElementById('f-name').value.trim();
      const av    = document.getElementById('f-av').value.trim().toUpperCase();
      const role  = document.getElementById('f-role').value;
      const hours = parseInt(document.getElementById('f-hours').value) || 0;
      const kd    = parseFloat(document.getElementById('f-kd').value) || 0;
      if (!name) return alert('Введи никнейм');
      const c = ROLE_COLORS[role];
      if (editId) {
        const idx = members.findIndex(x => x.id === editId);
        members[idx] = { ...members[idx], name, av: av || name.slice(0,2).toUpperCase(), role, hours, kd, bg: c.bg, fg: c.fg };
      } else {
        const newId = Date.now();
        members.push({ id: newId, av: av || name.slice(0,2).toUpperCase(), name, role, game:'Reforger', hours, kd, online:false, bg: c.bg, fg: c.fg });
      }
      saveData('members', members);
      closeModal();
      render();
    }

    function deleteMember(id) {
      if (!confirm('Удалить участника?')) return;
      const members = getData('members').filter(m => m.id !== id);
      saveData('members', members);
      render();
    }

    render();
  </script>
</body>
</html>
